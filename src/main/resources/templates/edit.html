
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h2>Edit Expense</h2>

<form action="/update" method="post">

    <input type="hidden" name="id" th:value="${expense.id}">

    <input type="text" name="title" th:value="${expense.title}">
    <input type="number" name="amount" th:value="${expense.amount}">
    <input type="text" name="category" th:value="${expense.category}">
    <input type="text" name="date" th:value="${expense.date}">

    <button type="submit">Update</button>

</form>

</body>
</html>
